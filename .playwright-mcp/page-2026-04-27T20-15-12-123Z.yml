              - 'img "D2-D: Methods" [ref=e394]'
          - paragraph [ref=e395]: "The example workflow keeps the analysis intentionally small and inspectable: load the synthetic perimeter sequence, calculate seven velocity metrics for each time step, group those metrics by what they emphasize, and export figures that can be checked by someone outside the group."
          - paragraph [ref=e396]: "The seven definitions are organized into functional groups:"
          - list [ref=e397]:
            - listitem [ref=e398]:
              - strong [ref=e399]: "Core baselines:"
              - text: optimal transport and area gain per perimeter length.
            - listitem [ref=e400]:
              - strong [ref=e401]: "Diagnostic surge detectors:"
              - text: longest vector and P95 advance.
            - listitem [ref=e402]:
              - strong [ref=e403]: "Conservative proxies:"
              - text: mean advance and equivalent radius growth.
            - listitem [ref=e404]:
              - strong [ref=e405]: "Niche translation measure:"
              - text: centroid drift.
          - paragraph [ref=e406]: "These categories are heuristic rather than exhaustive. Their purpose is to clarify how different definitions emphasize different aspects of change: growth, translation, deformation, rare advances, or stable summary behavior."
