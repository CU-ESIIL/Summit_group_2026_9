          - paragraph [ref=e466]: The most reusable output from this example is a practical taxonomy and decision framework for fire polygon velocity.
          - paragraph [ref=e467]: "Specifically, the project provides:"
          - list [ref=e468]:
            - listitem [ref=e469]: A side-by-side comparison of seven velocity metrics.
            - listitem [ref=e470]: A controlled synthetic sequence for interpreting metric behavior.
            - listitem [ref=e471]: A functional grouping of metrics by what they measure.
            - listitem [ref=e472]: Guidance for selecting metrics based on the question at hand.
          - paragraph [ref=e473]: "The work is intentionally focused on method and interpretation. The synthetic sequence isolates geometry, but real satellite-derived perimeters introduce additional complexities: pixel stair-steps, temporal compositing, truncated narrow runs, and sensor-specific biases. These factors can inflate or dampen distance-based measures. The framework does not remove those uncertainties; it makes them visible."
          - paragraph [ref=e474]: "Next steps are to carry the framework into real data and models:"
          - list [ref=e475]:
            - listitem [ref=e476]: Apply the taxonomy to MTBS, MODIS, VIIRS, Landsat, and related products.
            - listitem [ref=e477]: Evaluate how resolution and smoothing affect each metric.
            - listitem [ref=e478]: Compare observed polygon velocities with model outputs.
            - listitem [ref=e479]: Develop tools that help users select metrics for specific purposes.
            - listitem [ref=e480]: Extend the framework toward a moment-based synthesis separating growth, translation, dilation, and deformation.
