          - paragraph [ref=e324]: How should we measure the velocity of an evolving fire polygon, and how does the choice of metric change the story we tell about fire spread?
          - paragraph [ref=e325]:
            - text: "In fire behavior science, rate of spread has a clear meaning: how quickly a flame front advances through fuel under given conditions"
            - link "Finney, 1998" [ref=e326] [cursor=pointer]:
              - /url: http://127.0.0.1:8765/#ref-finney1998
            - text: . That concept underpins both models and operational thinking.
          - paragraph [ref=e327]: Satellite-era fire records are different. They often arrive as daily or near-daily outlines of burned area derived from products such as MODIS, VIIRS, Landsat, MTBS, or related fire-perimeter datasets. Those outlines are not simple lines moving forward. They are shapes that grow, stretch, fold, and sometimes reorganize.
          - paragraph [ref=e328]: The translation from local spread to polygon change is therefore not straightforward. If a perimeter extends eastward, gains area, develops fine-scale structure, and shifts its center of mass, which of those changes counts as velocity? Different definitions answer that question in different ways.
          - paragraph [ref=e329]: "The gap this project addresses is quiet but important: the same fire can appear fast or slow, stable or erratic, depending on how velocity is defined. Without a clear taxonomy, these differences can be mistaken for disagreement rather than recognized as different views of the same evolving system."
