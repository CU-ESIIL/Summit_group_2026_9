          - heading "Fire Polygon Velocity Project" [level=1] [ref=e202]
          - paragraph [ref=e203]:
            - img "Fire spread progression over a mountain landscape" [ref=e204]
          - paragraph [ref=e205]: We often talk about how fast a wildfire moves. But once a fire is seen from space as a changing polygon rather than a line of flame, speed stops being a single, obvious thing.
          - paragraph [ref=e206]: "A perimeter can push forward in one direction, expand everywhere at once, wrinkle and branch, or even rearrange internally without gaining much new area. Each of these changes is real. Each can be measured. And each can yield a different answer to the same question: how fast did the fire move?"
          - paragraph [ref=e207]: This example project takes that ambiguity seriously. It develops a practical way to think about, and measure, fire polygon velocity by comparing several definitions on the same evolving fire. The aim is not to declare a single correct metric, but to show what each measure captures, what it leaves out, and how the choice of metric shapes the story we tell about fire.
