          - paragraph [ref=e427]: The central result is that polygon-derived velocity is not a single objective quantity. It depends on how change is defined and measured.
          - paragraph [ref=e428]: "Three claims are worth carrying into a public share-out:"
          - list [ref=e429]:
            - listitem [ref=e430]:
              - strong [ref=e431]: Velocity depends on definition.
              - text: Across the synthetic sequence, all metrics detect growth, but they diverge in magnitude and interpretation. Some emphasize rare, rapid advances; others describe steady expansion; others capture whole-system rearrangement.
            - listitem [ref=e432]:
              - strong [ref=e433]: Growth and reorganization are different signals.
              - text: Area gain per perimeter length reports velocity only when new area is added. Optimal transport, under the cost formulation used here, measures the displacement needed to transform one polygon into the next. That means a fire can show little new area gain while still undergoing substantial internal reorganization.
            - listitem [ref=e434]:
              - strong [ref=e435]: Extreme metrics are informative but selective.
              - text: The longest-vector metric highlights the single largest advance between perimeters, making it sensitive to rare leaps such as spotting or branching runs. P95 advance offers a more stable upper-tail version. These measures are useful for head-fire or surge questions, but less appropriate for typical spread.
            - listitem [ref=e436]:
              - strong [ref=e437]: Stable summaries can hide structure.
              - text: Mean advance and equivalent radius growth produce smooth, comparable time series. That stability is useful, but it can obscure anisotropy, directional runs, and boundary complexity. Centroid drift captures net migration, but misses expansion that occurs without large translation.
          - paragraph [ref=e438]: The same fire can support multiple, internally consistent descriptions of its motion. That does not indicate a flaw in the metrics. It reflects the fact that each definition is a lens on a complex, evolving shape. Metric choice is therefore not just a technical detail; it shapes the scientific claim.
