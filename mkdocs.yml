# Configuration
theme:
  highlightjs: true
  name: material
  custom_dir: docs/overrides
  font: false
  logo: 'assets/oasis_logo.png'
  favicon: 'assets/esiil_content/favicon.ico'
  # setting features for the navigation tab
  features:
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
  # Default values, taken from mkdocs_theme.yml
  language: en
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Options
extra:
  homepage: https://cu-esiil.github.io/home/
  social:
    - icon: fontawesome/brands/github
    # link: https://github.com/cu-esiil/

extra_css:
  - stylesheets/tokens.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mode-toggle.js
  - javascripts/presentation-mode.js
  - javascripts/report-out-gallery.js

hooks:
  - hooks.py

plugins:
    - search
    - mkdocstrings
    - git-revision-date
    - mkdocs-jupyter:
          include_source: True
          ignore_h1_titles: True
markdown_extensions:
  - admonition
  - toc:
      toc_depth: 2
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - docs

validation:
  omitted_files: ignore
